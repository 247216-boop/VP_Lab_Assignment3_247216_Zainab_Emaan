<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The New York Collection | Harry Winston Inspired</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Luxury Font Import */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&display=swap');

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Playfair Display', serif;
        }

        /* Moving Scene Container */
        .hero-video-container {
            position: relative;
            height: 100vh; /* Full Screen Height */
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Background Video/Image that moves */
        #bg-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1;
            transform: translate(-50%, -50%);
            /* "Moving scene" effect using slow zoom animation */
            animation: slowZoom 20s infinite alternate;
        }

        @keyframes slowZoom {
            from { transform: translate(-50%, -50%) scale(1); }
            to { transform: translate(-50%, -50%) scale(1.15); }
        }

        /* Elegant Overlay */
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); /* Dims the video slightly */
        }

        /* Text Styling (Harry Winston Style) */
        .content {
            position: relative;
            color: white;
            text-align: center;
            letter-spacing: 4px;
        }

        .content h1 {
            font-size: 4rem;
            font-weight: 400;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .content p {
            font-size: 1.2rem;
            font-style: italic;
            opacity: 0.9;
        }

        .explore-btn {
            margin-top: 30px;
            padding: 12px 35px;
            border: 1px solid white;
            background: transparent;
            color: white;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: 0.5s;
        }

        .explore-btn:hover {
            background: white;
            color: black;
        }
    </style>
</head>
<body>

    <div class="hero-video-container">
        <img src="https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?w=1600&q=80" id="bg-video" alt="Luxury Background">
        
        <div class="overlay"></div>

        <div class="content">
            <p>High Jewelry</p>
            <h1>The New York Collection</h1>
            <button class="explore-btn">Discover the Collection</button>
        </div>
    </div>

</body>
</html>
