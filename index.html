<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zainab Emaan | Premium Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;500&display=swap');

        body { background-color: #000; color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        /* Full Screen Luxury Video Section */
        .hero-video-section {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .video-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            object-fit: cover;
            filter: brightness(50%);
        }

        .hero-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 5rem;
            letter-spacing: 10px;
            text-transform: uppercase;
        }

        /* Project Cards Section */
        .projects-container { padding: 80px 0; background: #fff; color: #333; border-top-left-radius: 50px; border-top-right-radius: 50px; }

        .project-card {
            border: none;
            border-radius: 15px;
            transition: 0.4s;
            background: #f8f9fa;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .project-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

        .btn-view { background: #000; color: #fff; border-radius: 0; padding: 10px 25px; font-size: 12px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <section class="hero-video-section">
        <video autoplay muted loop playsinline class="video-bg">
            <source src="https://assets.mixkit.co/videos/preview/mixkit-glittering-gold-and-silver-particles-on-black-background-4856-large.mp4" type="video/mp4">
        </video>
        <div class="hero-text">
            <p style="letter-spacing: 5px; opacity: 0.8;">WEB ENGINEERING LAB</p>
            <h1>ZAINAB EMAAN</h1>
            <p class="mt-3">Scroll to discover 20 professional applications</p>
        </div>
    </section>

    <section class="projects-container">
        <div class="container text-center mb-5">
            <h2 class="fw-bold mb-4" style="font-family: 'Playfair Display'; color: #000;">The Project Collection</h2>
            <div class="row g-4" id="projectGrid"></div>
        </div>
    </section>

    <script>
        const projects = [
            "Registration Form", "Profile Dashboard", "Modern Hero", "Vertical Tabs", 
            "Toast Notifications", "Offcanvas Sidebar", "Table Pagination", "Advanced Mega Nav", 
            "Floating Chat", "Vertical Timeline", "Multi-step Form", "E-commerce Gallery",
            "Analytics Charts", "User Profile Card", "Pricing Tables", "Login Modal",
            "Search Filter", "Dark Mode Toggle", "Video Background", "Final Lab Dashboard"
        ];

        const grid = document.getElementById('projectGrid');
        projects.forEach((name, i) => {
            grid.innerHTML += `
                <div class="col-md-6 col-lg-4">
                    <div class="card project-card p-4 shadow-sm h-100">
                        <small class="text-muted">Application 0${i+1}</small>
                        <h5 class="fw-bold my-3">${name}</h5>
                        <a href="project${i+1}/index.html" class="btn btn-view mt-auto">VIEW LAB</a>
                    </div>
                </div>
            `;
        });
    </script>

</body>
</html>
