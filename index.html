<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zainab's Engineering Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
        }
        body {
            background-color: #f8f9fa;
            background-image: radial-gradient(#d1d1d1 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .hero-section {
            background: var(--primary-gradient);
            color: white;
            padding: 80px 0;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
            margin-bottom: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .project-card {
            border: none;
            border-radius: 20px;
            background: var(--glass-bg);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            height: 100%;
        }
        .project-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }
        .card-icon {
            font-size: 2.5rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }
        .btn-view {
            background: var(--primary-gradient);
            border: none;
            border-radius: 10px;
            padding: 10px 25px;
            color: white;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-view:hover {
            opacity: 0.9;
            transform: scale(1.05);
            color: white;
        }
        .badge-number {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #eee;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #764ba2;
        }
    </style>
</head>
<body>

<section class="hero-section text-center">
    <div class="container">
        <h1 class="display-3 fw-bold mb-3">Zainab's Creative Lab</h1>
        <p class="lead opacity-75">Showcasing 20 Professional Web Engineering Projects</p>
        <div class="mt-4">
            <span class="badge bg-light text-dark p-2 px-3 rounded-pill me-2">Bootstrap 5</span>
            <span class="badge bg-light text-dark p-2 px-3 rounded-pill me-2">Responsive Design</span>
            <span class="badge bg-light text-dark p-2 px-3 rounded-pill">UI/UX Optimized</span>
        </div>
    </div>
</section>

<div class="container mb-5">
    <div class="row g-4" id="projectGrid">
        </div>
</div>

<script>
    const projects = [
        "Registration Form", "Profile Dashboard", "Modern Hero", "Vertical Tabs", 
        "Toast Notifications", "Offcanvas Sidebar", "Table Pagination", "Advanced Mega Nav", 
        "Floating Chat", "Vertical Timeline", "Multi-step Form", "E-commerce Gallery",
        "Analytics Charts", "User Profile Card", "Pricing Tables", "Login Modal",
        "Search Filter Interface", "Dark Mode Toggle", "Video Background", "Final Lab Dashboard"
    ];

    const grid = document.getElementById('projectGrid');
    
    projects.forEach((name, i) => {
        const projectNum = i + 1;
        grid.innerHTML += `
            <div class="col-md-6 col-lg-3">
                <div class="card project-card p-4 text-center">
                    <span class="badge-number">Project ${projectNum}</span>
                    <div class="card-icon">
                        <i class="fas fa-laptop-code"></i>
                    </div>
                    <h5 class="fw-bold mb-2">${name}</h5>
                    <p class="text-muted small mb-4">A high-quality responsive implementation using Bootstrap components.</p>
                    <a href="project${projectNum}/index.html" class="btn btn-view mt-auto">Open Lab</a>
                </div>
            </div>
        `;
    });
</script>

</body>
</html>
