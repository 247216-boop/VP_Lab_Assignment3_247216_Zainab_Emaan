<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAINAB EMAAN | High Jewelry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400&display=swap');

        body { background-color: #fff; color: #000; font-family: 'Montserrat', sans-serif; }

        /* LUXURY NAV */
        .brand-nav { background: #1a1a1a; padding: 25px; text-align: center; color: white; border-bottom: 1px solid #333; }
        .brand-nav h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; letter-spacing: 8px; margin: 0; text-transform: uppercase; }

        /* HERO SECTION */
        .hero-section {
            height: 90vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1573408302185-91ffb19b7a11?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .hero-text h2 { font-family: 'Playfair Display', serif; font-size: 4rem; letter-spacing: 5px; }

        /* DIAMOND TILES */
        .collection-grid { padding: 80px 0; }
        .diamond-card { border: none; border-radius: 0; margin-bottom: 30px; transition: 0.5s; background: #fff; }
        .diamond-card:hover { opacity: 0.8; }
        
        .diamond-img { height: 450px; object-fit: cover; width: 100%; }
        
        .collection-name { font-family: 'Playfair Display', serif; font-size: 1.4rem; padding: 20px 0 5px; text-transform: uppercase; letter-spacing: 2px; }
        .btn-discover { border: none; border-bottom: 1px solid #000; background: none; font-size: 0.7rem; letter-spacing: 2px; padding: 5px 0; font-weight: bold; }
    </style>
</head>
<body>

    <div class="brand-nav">
        <h1>ZAINAB EMAAN</h1>
    </div>

    <section class="hero-section">
        <div class="hero-text">
            <p style="letter-spacing: 4px;">ESTABLISHED 1932</p>
            <h2>The Brilliance Series</h2>
            <p>A legacy of world-class diamonds</p>
        </div>
    </section>

    <div class="container collection-grid">
        <div class="row" id="diamondGrid">
            </div>
    </div>

    <script>
        const diamondStore = [
            { name: "The Emerald Cut", img: "https://images.unsplash.com/photo-1605100869012-70b797520444?q=80&w=500" },
            { name: "Marquise Solitaire", img: "https://images.unsplash.com/photo-1599661046289-e31897846e41?q=80&w=500" },
            { name: "Radiant Halo", img: "https://images.unsplash.com/photo-1573408302185-91ffb19b7a11?q=80&w=500" },
            { name: "Eternal Band", img: "https://images.unsplash.com/photo-1615657973599-9941457f5966?q=80&w=500" },
            { name: "Royal Pear", img: "https://images.unsplash.com/photo-1603561591411-071c4f723918?q=80&w=500" },
            { name: "Classic Cushion", img: "https://images.unsplash.com/photo-1515377905703-c4788e51af15?q=80&w=500" }
        ];

        const grid = document.getElementById('diamondGrid');
        
        // Loop to create 20 tiles using the diamond themes
        for (let i = 0; i < 20; i++) {
            const product = diamondStore[i % diamondStore.length];
            grid.innerHTML += `
                <div class="col-md-4 text-center">
                    <div class="diamond-card">
                        <img src="${product.img}" class="diamond-img" alt="Diamond Piece">
                        <div class="collection-name">${product.name}</div>
                        <a href="project${i+1}/index.html" class="btn-discover">DISCOVER ></a>
                    </div>
                </div>
            `;
        }
    </script>

</body>
</html>
