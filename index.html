<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAINAB EMAAN | Fine Jewelry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400&display=swap');
        body { background-color: #fff; color: #000; font-family: 'Montserrat', sans-serif; margin: 0; }
        .brand-nav { background: #1a1a1a; padding: 30px; text-align: center; color: white; }
        .brand-nav h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; letter-spacing: 10px; margin: 0; text-transform: uppercase; }
        .hero { height: 80vh; background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://images.unsplash.com/photo-1588612140409-f80e920d3f25?q=80&w=1600'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; color: white; text-align: center; }
        .hero h2 { font-family: 'Playfair Display', serif; font-size: 4rem; text-transform: uppercase; letter-spacing: 5px; }
        .diamond-grid { padding: 60px 0; }
        .diamond-card { border: none; margin-bottom: 40px; text-align: center; text-decoration: none; color: #000; display: block; }
        .diamond-img { height: 400px; width: 100%; object-fit: cover; transition: 0.5s; }
        .diamond-card:hover .diamond-img { opacity: 0.7; }
        .diamond-name { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-top: 15px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="brand-nav"><h1>ZAINAB EMAAN</h1></div>
    <section class="hero"><div><h2>Diamond Store</h2><p>The 20 Signature Collections</p></div></section>
    <div class="container diamond-grid"><div class="row" id="grid"></div></div>
    <script>
        const imgs = [
            "https://images.unsplash.com/photo-1605100869012-70b797520444?w=500",
            "https://images.unsplash.com/photo-1599661046289-e31897846e41?w=500",
            "https://images.unsplash.com/photo-1573408302185-91ffb19b7a11?w=500",
            "https://images.unsplash.com/photo-1615657973599-9941457f5966?w=500"
        ];
        const names = ["Emerald Cut", "Radiant Halo", "Brilliant Solitaire", "Marquise Edit"];
        const grid = document.getElementById('grid');
        for (let i = 1; i <= 20; i++) {
            grid.innerHTML += `
                <div class="col-md-4">
                    <a href="project${i}/index.html" class="diamond-card">
                        <img src="${imgs[i%4]}" class="diamond-img">
                        <div class="diamond-name">${names[i%4]} ${i}</div>
                        <small style="letter-spacing:2px; color:#888;">DISCOVER ></small>
                    </a>
                </div>`;
        }
    </script>
</body>
</html>
