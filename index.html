<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAINAB EMAAN | Fine Jewelry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500&display=swap');

        body { background-color: #fff; color: #000; font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        /* LUXURY TOP NAV */
        .brand-nav { background: #1a1a1a; padding: 25px; text-align: center; color: white; border-bottom: 1px solid #333; }
        .brand-nav h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; letter-spacing: 12px; margin: 0; text-transform: uppercase; font-weight: 400; }

        /* HERO SECTION (Diamonds in background) */
        .hero-diamond-section {
            height: 90vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1596944924616-7b38e7cfac36?w=1600&q=80') no-repeat center center;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .hero-text h2 { font-family: 'Playfair Display', serif; font-size: 4.5rem; letter-spacing: 5px; font-weight: 400; text-transform: uppercase; }

        /* DIAMOND GRID Section */
        .projects-container { padding: 80px 0; background: #fff; }
        .project-card { border: none; border-radius: 0; margin-bottom: 40px; background: #fff; }
        .project-card:hover { opacity: 0.8; transition: 0.5s; }
        
        .diamond-img { height: 400px; object-fit: cover; width: 100%; filter: brightness(1.1); }
        
        .collection-name { font-family: 'Playfair Display', serif; font-size: 1.5rem; padding: 25px 0 5px; text-transform: uppercase; letter-spacing: 2px; font-weight: 400; color: #111; }
        .app-id { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Discover Button (Minimalist) */
        .btn-discover { border: none; border-bottom: 1px solid #000; background: none; font-size: 0.75rem; letter-spacing: 2px; padding: 5px 0; font-weight: 600; text-transform: uppercase; color: #111; text-decoration: none; display: inline-block; }
        .btn-discover:hover { color: #555; }
    </style>
</head>
<body>

    <div class="brand-nav">
        <h1>ZAINAB EMAAN</h1>
    </div>

    <section class="hero-diamond-section">
        <div class="hero-text">
            <p style="letter-spacing: 5px; opacity: 0.9; text-transform: uppercase;">Est. 2026</p>
            <h2>Diamond Store</h2>
            <p style="font-size: 1.2rem; margin-top: 10px;">Exploring the 20 Signature Pieces</p>
        </div>
    </section>

    <section class="projects-container">
        <div class="container text-center mb-5">
            <h2 class="fw-normal mb-5" style="font-family: 'Playfair Display'; color: #000; letter-spacing: 3px; text-transform: uppercase;">The New York Collection</h2>
            <div class="row g-5" id="diamondGrid">
                </div>
        </div>
    </section>

    <script>
        // Maine high-end diamond images use ki hain (Engagement rings, clarity cuts)
        const diamonds = [
            { name: "Emerald Solitaire", img: "https://images.unsplash.com/photo-1605100869012-70b797520444?q=80&w=500" },
            { name: "Radiant Halos", img: "https://images.unsplash.com/photo-1599661046289-e31897846e41?q=80&w=500" },
            { name: "The Brilliant Cut", img: "https://images.unsplash.com/photo-1573408302185-91ffb19b7a11?q=80&w=500" },
            { name: "Eternal Sparkle", img: "https://images.unsplash.com/photo-1615657973599-9941457f5966?q=80&w=500" },
            { name: "Marquise Dream", img: "https://images.unsplash.com/photo-1603561591411-071c4f723918?q=80&w=500" },
            { name: "Classic Cushions", img: "https://images.unsplash.com/photo-1515377905703-c4788e51af15?q=80&w=500" }
        ];

        const grid = document.getElementById('diamondGrid');
        
        // Dynamic loop to create 20 perfect tiles
        for (let i = 0; i < 20; i++) {
            const diamond = diamonds[i % diamonds.length];
            grid.innerHTML += `
                <div class="col-md-6 col-lg-4 text-center">
                    <div class="project-card shadow-sm">
                        <img src="${diamond.img}" class="diamond-img" alt="Luxury Diamond Piece">
                        <div class="card-body p-0 pb-4">
                            <small class="app-id d-block mt-3">💎 Application 0${i+1}</small>
                            <div class="collection-name">${diamond.name}</div>
                            <a href="project${i+1}/index.html" class="btn-discover mt-3">DISCOVER THE PIECE ></a>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>

</body>
</html>
