<<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zainab Emaan | Diamond Edition Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;500&display=swap');

        body { background-color: #000; color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        /* SECTION 1: DIAMOND HERO (Moving Background) */
        .hero-diamond-section {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            /* Yahan humne video ki jagah high-quality diamond gif/image lagayi hai */
            background: url('https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExbXN6MzVreW96bXN6MzVreW96bXN6MzVreW96bXN6MzVreW96bZ&ep=v1_gifs_search&rid=giphy.gif&ct=g') no-repeat center center;
            background-size: cover;
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); /* Is se text saaf nazar aayega */
            z-index: 1;
        }

        .hero-text { position: relative; z-index: 2; }

        .hero-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 5rem;
            letter-spacing: 10px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        /* SECTION 2: PROJECT CARDS (White Background) */
        .projects-container { 
            padding: 80px 0; 
            background: #fff; 
            color: #333; 
            border-top-left-radius: 50px; 
            border-top-right-radius: 50px; 
            position: relative;
            z-index: 3;
            margin-top: -50px; /* Hero section ke upar thoda charhane ke liye */
        }

        .project-card {
            border: none;
            border-radius: 20px;
            transition: 0.4s ease-in-out;
            background: #f8f9fa;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            height: 100%;
        }

        .project-card:hover { 
            transform: scale(1.03); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); 
        }

        /* Diamond Image inside each card */
        .card-diamond-img {
            height: 200px;
            object-fit: cover;
            width: 100%;
        }

        .btn-view { 
            background: linear-gradient(45deg, #2c3e50, #000);
            color: #fff; 
            border: none;
            border-radius: 50px; 
            padding: 12px 30px; 
            font-size: 12px; 
            letter-spacing: 2px; 
            text-transform: uppercase;
            font-weight: bold;
        }
        .btn-view:hover { color: #fff; opacity: 0.9; }
    </style>
</head>
<body>

    <section class="hero-diamond-section">
        <div class="hero-overlay"></div>
        <div class="hero-text">
            <p style="letter-spacing: 5px; opacity: 0.8; color: #eee;">PREMIUM WEB ENGINEERING PORTFOLIO</p>
            <h1>ZAINAB EMAAN</h1>
            <p class="mt-3" style="color: #ccc;">Scroll to explore the 20-project collection</p>
        </div>
    </section>

    <section class="projects-container">
        <div class="container text-center mb-5">
            <h2 class="fw-bold mb-5" style="font-family: 'Playfair Display'; color: #000; letter-spacing: 2px;">THE DIAMOND COLLECTION</h2>
            <div class="row g-4" id="projectGrid"></div>
        </div>
    </section>

    <script>
        // Har project ke liye aik different high-quality diamond photo
        const diamondImages = [
            "https://images.unsplash.com/photo-1615657973599-9941457f5966?w=500", // Lab 1
            "https://images.unsplash.com/photo-1605100869012-70b797520444?w=500", // Lab 2
            "https://images.unsplash.com/photo-1596944924616-7b38e7cfac36?w=500", // Lab 3
            "https://images.unsplash.com/photo-1619119069172-a199d75b376d?w=500", // Lab 4
            "https://images.unsplash.com/photo-1588612140409-f80e920d3f25?w=500", // Lab 5
            "https://images.unsplash.com/photo-1598560913912-788b1f22b78a?w=500", // Lab 6
            "https://images.unsplash.com/photo-1617113941321-1776991b920a?w=500", // Lab 7
            "https://images.unsplash.com/photo-1608042314453-ae338d80c427?w=500", // Lab 8
            "https://images.unsplash.com/photo-1599661046289-e31897846e41?w=500", // Lab 9
            "https://images.unsplash.com/photo-1615657973599-9941457f5966?w=500", // Lab 10 (repeat for variety)
            "https://images.unsplash.com/photo-1605100869012-70b797520444?w=500", // Lab 11
            "https://images.unsplash.com/photo-1596944924616-7b38e7cfac36?w=500", // Lab 12
            "https://images.unsplash.com/photo-1619119069172-a199d75b376d?w=500", // Lab 13
            "https://images.unsplash.com/photo-1588612140409-f80e920d3f25?w=500", // Lab 14
            "https://images.unsplash.com/photo-1598560913912-788b1f22b78a?w=500", // Lab 15
            "https://images.unsplash.com/photo-1617113941321-1776991b920a?w=500", // Lab 16
            "https://images.unsplash.com/photo-1608042314453-ae338d80c427?w=500", // Lab 17
            "https://images.unsplash.com/photo-1599661046289-e31897846e41?w=500", // Lab 18
            "https://images.unsplash.com/photo-1615657973599-9941457f5966?w=500", // Lab 19
            "https://images.unsplash.com/photo-1605100869012-70b797520444?w=500"  // Lab 20
        ];

        const projects = [
            "Registration Form", "Profile Dashboard", "Modern Hero", "Vertical Tabs", 
            "Toast Notifications", "Offcanvas Sidebar", "Table Pagination", "Advanced Mega Nav", 
            "Floating Chat", "Vertical Timeline", "Multi-step Form", "E-commerce Gallery",
            "Analytics Charts", "User Profile Card", "Pricing Tables", "Login Modal",
            "Search Filter", "Dark Mode Toggle", "Video Background", "Final Lab Dashboard"
        ];

        const grid = document.getElementById('projectGrid');
        projects.forEach((name, i) => {
            const diamondImg = diamondImages[i] || diamondImages[0]; // Fallback to first image if index out of bounds
            grid.innerHTML += `
                <div class="col-md-6 col-lg-4">
                    <div class="card project-card position-relative">
                        <img src="${diamondImg}" class="card-diamond-img" alt="Diamond Project ${i+1}">
                        <div class="card-body text-center p-4">
                            <small class="text-muted d-block mb-2">💎 Application ${i+1}</small>
                            <h5 class="fw-bold mb-4" style="color: #000;">${name}</h5>
                            <a href="project${i+1}/index.html" class="btn btn-view">VIEW LAB assignment</a>
                        </div>
                    </div>
                </div>
            `;
        });
    </script>

</body>
</html>
